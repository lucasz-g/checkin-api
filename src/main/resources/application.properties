# ====================================================================
# CONFIGURAÇÃO PRINCIPAL DA APLICAÇÃO
# ====================================================================

# Ativar perfil padrão (dev)
spring.profiles.active=dev

# Configurações do Servidor
server.port=8080
server.servlet.context-path=/

# Configurações do Spring
spring.application.name=CheckIn API

# Configurações do JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configurações do Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Configurações do Springdoc (Swagger)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ====================================================================
# Configurações de segurança JWT
# ====================================================================

# Chave secreta
# chave é usada pelo JwtTokenProvider.
# Foi criada com o comando: openssl rand -base64 32 no terminal (GitBash).
security.jwt.secret=${SECURITY_JWT_SECRET:qMY1xTECvJOOysjMvn3nNWI6hwyuLXPPBECk0jroK98=}

# Tempo de expiração do token em milissegundos. 86400000 ms = 24 horas.
security.jwt.expiration=${SECURITY_JWT_EXPIRATION:86400000}

# URL padrão da API externa utilizada para obter sugestões de hábitos. Pode ser
# sobrescrita através de variável de ambiente (SUGESTAO_API_URL).
sugestao.api.url=${SUGESTAO_API_URL:https://bored-api.appbrewery.com/filter?type=recreational}
