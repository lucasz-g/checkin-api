# ====================================================================
# CONFIGURAÇÃO PRINCIPAL DA APLICAÇÃO
# ====================================================================

# Ativar perfil padrão (dev)
spring.profiles.active=dev

# Configurações do Servidor
server.port=8080
server.servlet.context-path=/

# Configurações do Spring
spring.application.name=CheckIn API

# Configurações do JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configurações do Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Configurações do Springdoc (Swagger)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ====================================================================
# Configurações de segurança JWT
# ====================================================================

# Chave secreta base64 para assinatura dos tokens JWT. Para ambientes de produção,
# defina uma chave forte via variável de ambiente (SECURITY_JWT_SECRET). Esta
# chave é usada pelo JwtTokenProvider.
security.jwt.secret=${SECURITY_JWT_SECRET:Q2FzYVNlY3JldE1lZGlvY3VyYVNlQ29kZQ==}

# Tempo de expiração do token em milissegundos. 86400000 ms = 24 horas.
security.jwt.expiration=${SECURITY_JWT_EXPIRATION:86400000}

# URL padrão da API externa utilizada para obter sugestões de hábitos. Pode ser
# sobrescrita através de variável de ambiente (SUGESTAO_API_URL).
sugestao.api.url=${SUGESTAO_API_URL:https://www.boredapi.com/api/activity?type=recreational}
