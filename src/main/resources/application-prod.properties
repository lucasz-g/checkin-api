# ====================================================================
# CONFIGURAÇÃO PARA AMBIENTE DE PRODUÇÃO (PROD)
# ====================================================================

# Configurações do PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:checkindb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driverClassName=org.postgresql.Driver

# Configurações do Hibernate para PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Desativar console do H2 em produção
spring.h2.console.enabled=false

# Não mostrar SQL em produção
spring.jpa.show-sql=false
